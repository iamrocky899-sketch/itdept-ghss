<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a8a">
    <title>IT Deptt. GHSS</title>
    <link rel="icon" href="148798.png">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root{--p:#1e3a8a;--s:#059669;--d:#dc2626;--bg:#f0f4f8;--c:#fff;--t:#1e293b;--tl:#64748b;--b:#e2e8f0}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
        .app{max-width:500px;margin:0 auto;background:var(--bg);min-height:100vh}
        .header{background:linear-gradient(135deg,#1e3a8a,#1e40af);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 15px rgba(30,58,138,.3);position:sticky;top:0;z-index:100}
        .header img{width:44px;height:44px;border-radius:10px;background:#fff;padding:3px}
        .header h1{font-size:18px;font-weight:700}.header small{font-size:10px;opacity:.9;display:block;text-transform:uppercase}
        .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--c);display:flex;padding:6px 0;z-index:100;border-top:1px solid var(--b);box-shadow:0 -2px 10px rgba(0,0,0,.05)}
        .nav button{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px;border:none;background:none;font-size:10px;font-weight:500;color:var(--tl);cursor:pointer;gap:3px}
        .nav button.active{color:var(--p)}.nav button span{font-size:22px}
        .content{padding:14px;padding-bottom:80px}.page{display:none}.page.active{display:block}
        .card{background:var(--c);border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid var(--b);box-shadow:0 1px 3px rgba(0,0,0,.04)}
        .card-title{font-size:16px;font-weight:700;color:var(--p);margin-bottom:14px}
        .form-group{margin-bottom:10px}.form-group label{display:block;font-size:11px;font-weight:600;color:var(--tl);margin-bottom:4px;text-transform:uppercase}
        .form-group label .opt{color:#94a3b8;font-weight:400;font-size:10px;text-transform:none}
        .form-group input{width:100%;padding:12px 14px;border:2px solid var(--b);border-radius:10px;font-size:14px;background:#f8fafc;font-family:inherit}
        .form-group input:focus{outline:none;border-color:#3b82f6;background:#fff}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .btn{padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px}
        .btn:active{transform:scale(.96)}.btn-p{background:var(--p);color:#fff}.btn-s{background:var(--s);color:#fff}.btn-d{background:var(--d);color:#fff}
        .btn-o{background:#fff;color:var(--p);border:2px solid var(--p)}.btn-sm{padding:8px 12px;font-size:11px}.btn-block{width:100%}
        .video-box{background:#000;border-radius:14px;overflow:hidden;position:relative;aspect-ratio:3/4;box-shadow:0 4px 15px rgba(0,0,0,.2)}
        .video-box video{width:100%;height:100%;object-fit:cover}.video-box canvas{position:absolute;top:0;left:0;width:100%;height:100%}
        .cam-switch{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.5);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:16px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
        .capture-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;background:#fff;border:4px solid var(--p);cursor:pointer;z-index:10}
        .capture-btn::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:var(--p)}
        .status-bar{background:var(--s);color:#fff;padding:12px 16px;border-radius:10px;margin:10px 0;text-align:center;font-weight:600;font-size:14px}
        .list-item{display:flex;align-items:center;padding:12px;background:#f8fafc;border-radius:10px;margin-bottom:6px;border:1px solid var(--b);cursor:pointer;gap:10px}
        .list-item:active{background:#eff6ff}.avatar{width:40px;height:40px;border-radius:50%;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
        .info{flex:1;min-width:0}.info strong{display:block;font-size:14px}.info small{display:block;font-size:11px;color:var(--tl);margin-top:1px}
        .info .hint{font-size:9px;color:#3b82f6;margin-top:2px}.status-p{color:var(--s);font-weight:700;font-size:11px}.status-a{color:var(--d);font-weight:700;font-size:11px}
        .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
        .stat-box{background:var(--c);padding:16px;border-radius:12px;text-align:center;border:1px solid var(--b)}
        .stat-box .num{font-size:28px;font-weight:700;color:var(--p);display:block}.stat-box .lbl{font-size:10px;color:var(--tl);text-transform:uppercase;margin-top:4px;display:block}
        .empty{text-align:center;padding:30px 20px;color:var(--tl)}.empty .icon{font-size:48px;display:block;margin-bottom:10px}
        .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;padding:12px 24px;border-radius:25px;font-weight:600;font-size:13px;color:#fff;box-shadow:0 8px 25px rgba(0,0,0,.2);animation:toastIn .3s ease}
        @keyframes toastIn{from{transform:translateX(-50%) translateY(-50px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
        .toast-s{background:var(--s)}.toast-e{background:var(--d)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
        .modal{background:#fff;border-radius:16px;padding:22px;width:92%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.3)}
        .modal h3{color:var(--p);font-size:17px;margin-bottom:16px}.modal .dr{display:flex;padding:8px 0;border-bottom:1px solid #f1f5f9}
        .modal .dr .dl{width:100px;font-size:11px;font-weight:600;color:var(--tl);text-transform:uppercase;flex-shrink:0}
        .modal .dr .dv{font-size:13px;color:var(--t);font-weight:500;flex:1}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <img src="148798.png" alt="Logo" onerror="this.style.display='none'">
        <div><small>Gameri Higher Secondary School</small><h1>IT Deptt. GHSS</h1></div>
    </div>

    <div class="content">
        <div class="page active" id="registerPage">
            <div class="card">
                <div class="card-title">📸 Register New Student</div>
                <div class="video-box">
                    <video id="rv" autoplay muted playsinline></video>
                    <canvas id="rc"></canvas>
                    <button class="cam-switch" onclick="switchCam('r')">🔄</button>
                    <button class="capture-btn" onclick="capture()" id="capBtn"></button>
                </div>
                <button class="btn btn-o btn-block" onclick="toggleCam()" style="margin-top:10px">
                    📷 <span id="camText">Start Camera</span>
                </button>
                <p id="camError" style="color:#dc2626;font-size:12px;margin-top:8px;display:none;text-align:center"></p>
            </div>
            <div class="card">
                <div class="card-title">📝 Student Details</div>
                <div class="form-group"><label>Student Name *</label><input id="sn" placeholder="Full name" required></div>
                <div class="row">
                    <div class="form-group"><label>Class *</label><input id="sc" placeholder="e.g. 10th" required></div>
                    <div class="form-group"><label>Section <span class="opt">(optional)</span></label><input id="ss" placeholder="e.g. A"></div>
                </div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="sd"></div>
                <div class="row">
                    <div class="form-group"><label>Father's Name</label><input id="sf" placeholder="Father"></div>
                    <div class="form-group"><label>Mother's Name</label><input id="sm" placeholder="Mother"></div>
                </div>
                <div class="form-group"><label>Aadhaar Number</label><input id="sa" placeholder="12-digit" maxlength="12"></div>
                <div class="form-group"><label>Mobile Number</label><input type="tel" id="smo" placeholder="10-digit" maxlength="10"></div>
                <div class="row">
                    <div class="form-group"><label>Village / City</label><input id="sv" placeholder="Village"></div>
                    <div class="form-group"><label>Post Office</label><input id="spo" placeholder="Post office"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>Police Station</label><input id="sps" placeholder="Police station"></div>
                    <div class="form-group"><label>PIN Number</label><input id="spi" placeholder="6-digit" maxlength="6"></div>
                </div>
            </div>
        </div>

        <div class="page" id="attendancePage">
            <div class="card">
                <div class="card-title">👥 Group Face Recognition</div>
                <div class="video-box">
                    <video id="av" autoplay muted playsinline></video>
                    <canvas id="ac"></canvas>
                    <button class="cam-switch" onclick="switchCam('a')">🔄</button>
                </div>
                <div style="display:flex;gap:10px;margin-top:10px">
                    <button class="btn btn-s" onclick="startRec()" style="flex:1">🎯 Start</button>
                    <button class="btn btn-d" onclick="stopRec()" style="flex:1">⏹ Stop</button>
                </div>
                <div id="gs"></div>
                <div id="rl" style="max-height:300px;overflow-y:auto"></div>
            </div>
            <div class="card">
                <div class="card-title">📅 Today's Attendance</div>
                <div id="tal" style="max-height:300px;overflow-y:auto"></div>
            </div>
        </div>

        <div class="page" id="recordsPage">
            <div class="card"><div class="card-title">📊 Statistics</div><div class="stats" id="sr"></div></div>
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <div class="card-title" style="margin:0">📋 Records</div>
                    <div style="display:flex;gap:6px">
                        <button class="btn btn-o btn-sm" onclick="toExcel()">📊 Excel</button>
                        <button class="btn btn-o btn-sm" onclick="toPDF()">📄 PDF</button>
                    </div>
                </div>
                <div id="rel"></div>
            </div>
        </div>

        <div class="page" id="studentsPage">
            <div class="card">
                <div class="card-title">👨‍🎓 Registered Students</div>
                <div style="text-align:center;margin-bottom:10px;font-size:10px;color:var(--tl)">👆 Tap for details</div>
                <div id="sl" style="max-height:400px;overflow-y:auto"></div>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="active" onclick="go('register')"><span>📸</span>Register</button>
        <button onclick="go('attendance')"><span>✅</span>Attendance</button>
        <button onclick="go('records')"><span>📊</span>Records</button>
        <button onclick="go('students')"><span>👥</span>Students</button>
    </div>
</div>

<div class="modal-overlay" id="mod" style="display:none" onclick="closeMod(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>👤 Student Details</h3>
        <div id="mb"></div>
        <button class="btn btn-d btn-block" onclick="closeMod()" style="margin-top:14px">Close</button>
    </div>
</div>

<script>
var students=[],faces=[],att={},rs=null,as=null,gi=null,rt={},cm='user',bep=null;

function beep(){try{var c=new(window.AudioContext||window.webkitAudioContext)();bep={play:function(){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.1;o.start();o.stop(c.currentTime+.08)}}}catch(e){bep={play:function(){}}}}

function sv(){try{localStorage.setItem('g_s',JSON.stringify(students));localStorage.setItem('g_f',JSON.stringify(faces));localStorage.setItem('g_a',JSON.stringify(att))}catch(e){}}
function ld(){try{students=JSON.parse(localStorage.getItem('g_s'))||[];faces=JSON.parse(localStorage.getItem('g_f'))||[];att=JSON.parse(localStorage.getItem('g_a'))||{}}catch(e){students=[];faces=[];att={}}}

function toast(m,t){t=t||'s';var e=document.createElement('div');e.className='toast toast-'+t;e.textContent=m;document.body.appendChild(e);setTimeout(function(){e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(function(){e.remove()},300)},2000)}

function go(p){
    stopCR();stopR();
    document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active')});
    document.querySelectorAll('.nav button').forEach(function(x){x.classList.remove('active')});
    document.getElementById(p+'Page').classList.add('active');
    var i={register:0,attendance:1,records:2,students:3};
    document.querySelectorAll('.nav button')[i[p]].classList.add('active');
    if(p=='records')upR();if(p=='students')upS();if(p=='attendance')upT();
}

// CAMERA - Fixed for Android WebView
async function getCam(f){
    // First, check if camera is available
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
        document.getElementById('camError').style.display='block';
        document.getElementById('camError').textContent='Camera not supported in this browser. Please check app permissions.';
        return null;
    }
    
    try{
        // Try with specific constraints first
        var stream=await navigator.mediaDevices.getUserMedia({
            video:{width:{ideal:640},height:{ideal:480},facingMode:f||'user'},
            audio:false
        });
        document.getElementById('camError').style.display='none';
        return stream;
    }catch(e1){
        try{
            // Try with minimal constraints
            var stream=await navigator.mediaDevices.getUserMedia({
                video:true,
                audio:false
            });
            document.getElementById('camError').style.display='none';
            return stream;
        }catch(e2){
            document.getElementById('camError').style.display='block';
            document.getElementById('camError').textContent='Camera access denied! Go to Settings > Apps > IT Deptt. GHSS > Permissions > Allow Camera';
            return null;
        }
    }
}

function switchCam(t){
    cm=cm=='user'?'environment':'user';
    if(t=='r'&&rs){stopCR();toggleCam()}
    else if(t=='a'&&as){stopR();startRec()}
}

async function toggleCam(){
    var v=document.getElementById('rv'),txt=document.getElementById('camText');
    if(rs){stopCR();txt.textContent='Start Camera';return}
    
    txt.textContent='Requesting camera...';
    rs=await getCam(cm);
    
    if(!rs){txt.textContent='Start Camera';return}
    
    v.srcObject=rs;txt.textContent='Stop Camera';
    v.onloadedmetadata=function(){
        var c=document.getElementById('rc'),ds={width:v.videoWidth,height:v.videoHeight};
        faceapi.matchDimensions(c,ds);
        setInterval(async function(){
            if(!rs)return;
            try{
                var d=await faceapi.detectAllFaces(v,new faceapi.TinyFaceDetectorOptions({inputSize:320})).withFaceLandmarks();
                var r=faceapi.resizeResults(d,ds),ctx=c.getContext('2d');
                ctx.clearRect(0,0,c.width,c.height);
                if(r.length>0){faceapi.draw.drawDetections(c,r);document.getElementById('capBtn').style.borderColor='#059669'}
                else document.getElementById('capBtn').style.borderColor='#1e3a8a'
            }catch(e){}
        },300)
    }
}

function stopCR(){if(rs){rs.getTracks().forEach(function(t){t.stop()});rs=null;var c=document.getElementById('rc');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height)}}

async function capture(){
    if(!rs){toast('Start camera first!','e');return}
    var n=document.getElementById('sn').value.trim(),c=document.getElementById('sc').value.trim();
    if(!n||!c){toast('Fill Name & Class!','e');return}
    try{
        toast('Capturing...','s');
        var d=await faceapi.detectSingleFace(document.getElementById('rv'),new faceapi.TinyFaceDetectorOptions({inputSize:320})).withFaceLandmarks().withFaceDescriptor();
        if(!d){toast('No face detected!','e');return}
        var s={id:'S'+Date.now().toString(36).toUpperCase(),name:n,class:c,
            section:document.getElementById('ss').value.trim(),dob:document.getElementById('sd').value,
            father:document.getElementById('sf').value.trim(),mother:document.getElementById('sm').value.trim(),
            aadhaar:document.getElementById('sa').value.trim(),mobile:document.getElementById('smo').value.trim(),
            village:document.getElementById('sv').value.trim(),post:document.getElementById('spo').value.trim(),
            police:document.getElementById('sps').value.trim(),pin:document.getElementById('spi').value.trim(),
            at:new Date().toISOString()};
        faces.push({sid:s.id,name:n,desc:Array.from(d.descriptor)});
        students.push(s);sv();if(bep)bep.play();
        toast(n+' registered!','s');
        document.querySelectorAll('#registerPage input').forEach(function(i){i.value=''});
        upS();
    }catch(e){toast('Error!','e')}
}

async function startRec(){
    if(!faces.length){toast('No students!','e');return}
    if(as)return;
    as=await getCam(cm);
    if(!as)return;
    document.getElementById('av').srcObject=as;
    document.getElementById('gs').innerHTML='<div class="status-bar">🔍 Scanning...</div>';
    document.getElementById('av').onloadedmetadata=function(){
        var c=document.getElementById('ac'),v=document.getElementById('av'),ds={width:v.videoWidth,height:v.videoHeight};
        faceapi.matchDimensions(c,ds);
        var lb=faces.map(function(f){return new faceapi.LabeledFaceDescriptors(f.name,[new Float32Array(f.desc)])});
        var fm=new faceapi.FaceMatcher(lb,.55);
        gi=setInterval(async function(){
            if(!as){clearInterval(gi);return}
            try{
                var d=await faceapi.detectAllFaces(v,new faceapi.TinyFaceDetectorOptions({inputSize:320})).withFaceLandmarks().withFaceDescriptors();
                var r=faceapi.resizeResults(d,ds),ctx=c.getContext('2d');
                ctx.clearRect(0,0,c.width,c.height);
                r.forEach(function(x){
                    var m=fm.findBestMatch(x.descriptor),cl=m.label!='unknown'?'#059669':'#dc2626';
                    new faceapi.draw.DrawBox(x.detection.box,{label:m.label!='unknown'?m.label:'Unknown',boxColor:cl}).draw(c);
                    if(m.label!='unknown'&&!rt[m.label])mark(m.label);
                });
                document.getElementById('gs').innerHTML='<div class="status-bar">✅ '+Object.keys(rt).length+' recognized</div>';
            }catch(e){}
        },1000)
    }
}

function stopR(){if(gi){clearInterval(gi);gi=null}if(as){as.getTracks().forEach(function(t){t.stop()});as=null;var c=document.getElementById('ac');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);document.getElementById('gs').innerHTML=''}}

function mark(n){
    var t=new Date().toISOString().split('T')[0],tm=new Date().toLocaleTimeString('en-IN',{hour12:true});
    if(!att[t])att[t]={};
    var s=students.find(function(x){return x.name===n});
    if(!s||att[t][s.id])return;
    att[t][s.id]={sid:s.id,name:n,class:s.class,section:s.section||'-',time:tm,status:'present'};
    rt[n]=true;sv();if(bep)bep.play();upRL();upT();
}

function upRL(){
    var t=new Date().toISOString().split('T')[0],r=Object.values(att[t]||{}),c=document.getElementById('rl');
    if(!r.length){c.innerHTML='<div class="empty"><span class="icon">👤</span>Waiting...</div>';return}
    c.innerHTML=r.map(function(x){return'<div class="list-item"><div class="avatar">'+x.name.charAt(0)+'</div><div class="info"><strong>'+x.name+'</strong><small>'+x.class+(x.section!=='-'?' - '+x.section:'')+' | '+x.time+'</small></div><span style="color:#059669;font-weight:700">✓</span></div>'}).join('')
}

function upT(){
    var t=new Date().toISOString().split('T')[0],r=Object.values(att[t]||{}),c=document.getElementById('tal');
    if(!r.length){c.innerHTML='<div class="empty"><span class="icon">📅</span>No attendance today</div>';return}
    c.innerHTML=r.map(function(x){return'<div class="list-item" onclick="showD(\''+x.sid+'\')"><div class="avatar">'+x.name.charAt(0)+'</div><div class="info"><strong>'+x.name+'</strong><small>'+x.class+(x.section!=='-'?' - '+x.section:'')+' | '+x.time+'</small><div class="hint">👆 Tap to view</div></div><span class="status-p">PRESENT</span></div>'}).join('')
}

function upR(){
    var t=new Date().toISOString().split('T')[0],tr=att[t]||{},tot=students.length,pr=Object.keys(tr).length,ab=Math.max(0,tot-pr);
    document.getElementById('sr').innerHTML='<div class="stat-box"><span class="num">'+tot+'</span><span class="lbl">Total</span></div><div class="stat-box"><span class="num" style="color:#059669">'+pr+'</span><span class="lbl">Present</span></div><div class="stat-box"><span class="num" style="color:#dc2626">'+ab+'</span><span class="lbl">Absent</span></div>';
    var c=document.getElementById('rel'),h='<div style="margin-bottom:10px"><strong>Date:</strong> '+t+'</div>';
    students.forEach(function(s){var r=tr[s.id],st=r?'present':'absent';h+='<div class="list-item" onclick="showD(\''+s.id+'\')"><div class="avatar">'+s.name.charAt(0)+'</div><div class="info"><strong>'+s.name+'</strong><small>'+s.class+(s.section?' - '+s.section:'')+' | '+(r?r.time:'-')+'</small><div class="hint">👆 Tap to view</div></div><span class="status-'+(st=='present'?'p':'a')+'">'+st.toUpperCase()+'</span></div>'});
    if(!tot)h='<div class="empty"><span class="icon">📋</span>No students</div>';
    c.innerHTML=h
}

function upS(){
    var c=document.getElementById('sl');
    if(!students.length){c.innerHTML='<div class="empty"><span class="icon">👨‍🎓</span>No students yet</div>';return}
    c.innerHTML=students.map(function(s,i){return'<div class="list-item" onclick="showD(\''+s.id+'\')"><div class="avatar">'+s.name.charAt(0)+'</div><div class="info"><strong>'+s.name+'</strong><small>'+s.class+(s.section?' - '+s.section:'')+' | '+(s.mobile||'No mobile')+'</small><div class="hint">👆 Tap for details</div></div><button class="btn btn-d btn-sm" onclick="event.stopPropagation();del('+i+')" style="padding:5px 8px;font-size:10px">🗑</button></div>'}).join('')
}

function del(i){if(!confirm('Delete?'))return;var s=students[i];students.splice(i,1);faces=faces.filter(function(f){return f.sid!==s.id});var t=new Date().toISOString().split('T')[0];if(att[t]&&att[t][s.id]){delete att[t][s.id];delete rt[s.name]}sv();upS();upRL();upT();toast('Deleted','e')}

function showD(id){
    var s=students.find(function(x){return x.id===id});if(!s)return;
    document.getElementById('mb').innerHTML='<div class="dr"><span class="dl">Name</span><span class="dv">'+(s.name||'-')+'</span></div><div class="dr"><span class="dl">Class</span><span class="dv">'+(s.class||'-')+'</span></div><div class="dr"><span class="dl">Section</span><span class="dv">'+(s.section||'-')+'</span></div><div class="dr"><span class="dl">DOB</span><span class="dv">'+(s.dob||'-')+'</span></div><div class="dr"><span class="dl">Father</span><span class="dv">'+(s.father||'-')+'</span></div><div class="dr"><span class="dl">Mother</span><span class="dv">'+(s.mother||'-')+'</span></div><div class="dr"><span class="dl">Aadhaar</span><span class="dv">'+(s.aadhaar||'-')+'</span></div><div class="dr"><span class="dl">Mobile</span><span class="dv">'+(s.mobile||'-')+'</span></div><div class="dr"><span class="dl">Village</span><span class="dv">'+(s.village||'-')+'</span></div><div class="dr"><span class="dl">Post Office</span><span class="dv">'+(s.post||'-')+'</span></div><div class="dr"><span class="dl">Police Stn</span><span class="dv">'+(s.police||'-')+'</span></div><div class="dr"><span class="dl">PIN</span><span class="dv">'+(s.pin||'-')+'</span></div>';
    document.getElementById('mod').style.display='flex'
}

function closeMod(e){if(!e||e.target===document.getElementById('mod'))document.getElementById('mod').style.display='none'}

function getData(){
    var t=new Date().toISOString().split('T')[0],tr=att[t]||{};
    return students.map(function(s){var r=tr[s.id];return{'Name':s.name,'Class':s.class,'Section':s.section||'-','Father':s.father||'-','Mother':s.mother||'-','Aadhaar':s.aadhaar||'-','Mobile':s.mobile||'-','Village':s.village||'-','Post Office':s.post||'-','Police Station':s.police||'-','PIN':s.pin||'-','DOB':s.dob||'-','Status':r?'Present':'Absent','Time':r?r.time:'-'}})
}

function toExcel(){try{var d=getData(),ws=XLSX.utils.json_to_sheet(d),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Attendance');XLSX.writeFile(wb,'IT_Dept_GHSS_'+new Date().toISOString().split('T')[0]+'.xlsx');toast('Excel exported!','s')}catch(e){toast('Export failed','e')}}

function toPDF(){try{var doc=new window.jspdf.jsPDF();doc.setFontSize(15);doc.setTextColor(30,58,138);doc.text('IT Deptt. GHSS',105,18,{align:'center'});doc.setFontSize(10);doc.setTextColor(100);doc.text('Gameri Higher Secondary School',105,26,{align:'center'});doc.text('Date: '+new Date().toLocaleDateString('en-IN'),105,33,{align:'center'});var d=getData();doc.autoTable({head:[['Name','Class','Section','Status','Time']],body:d.map(function(x){return[x['Name'],x['Class'],x['Section'],x['Status'],x['Time']]}),startY:40,styles:{fontSize:8},headStyles:{fillColor:[30,58,138],textColor:255,fontStyle:'bold'}});doc.save('IT_Dept_GHSS_'+new Date().toISOString().split('T')[0]+'.pdf');toast('PDF exported!','s')}catch(e){toast('Export failed','e')}}

    ld();beep();
    try{var u='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';await faceapi.nets.tinyFaceDetector.loadFromUri(u);await faceapi.nets.faceLandmark68Net.loadFromUri(u);await faceapi.nets.faceRecognitionNet.loadFromUri(u)}catch(e){}
    upT();upS()
}

window.addEventListener('beforeunload',function(){stopCR();stopR()});
init();
</script>
